{% extends "base.html" %}
{% block title %}Parol o'zgartirish muvaffaqiyatli{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="success-card">
        <div class="success-icon">✅</div>
        <h1>Parol muvaffaqiyatli o'zgartirildi!</h1>
        <p>Sizning parolingiz yangilandi. Yangi parol bilan tizimga kirishingiz mumkin.</p>

        <div class="success-actions">
            <a href="{% url 'article-list' %}" class="btn-success">Bosh sahifaga qaytish</a>
            <a href="{% url 'logout' %}" class="btn-secondary">Qayta kirish</a>
        </div>
    </div>
</div>

<style>
    .auth-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 70vh;
        padding: 20px;
    }

    .success-card {
        width: 100%;
        max-width: 420px;
        background: var(--bg-glass);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 40px;
        text-align: center;
        animation: slideUp 0.6s ease;
    }

    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .success-icon {
        font-size: 64px;
        margin-bottom: 20px;
        animation: bounce 0.6s ease;
    }

    @keyframes bounce {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.1); }
    }

    .success-card h1 {
        font-size: 28px;
        font-weight: 700;
        color: var(--text-main);
        margin-bottom: 12px;
        background: linear-gradient(135deg, #10b981, #059669);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    .success-card p {
        color: var(--text-muted);
        font-size: 15px;
        margin-bottom: 30px;
        line-height: 1.6;
    }

    .success-actions {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .btn-success {
        padding: 12px 16px;
        background: linear-gradient(135deg, #10b981, #059669);
        border: none;
        border-radius: 8px;
        color: white;
        font-weight: 600;
        font-size: 15px;
        cursor: pointer;
        transition: all 0.3s ease;
        display: inline-block;
        text-decoration: none;
        text-align: center;
    }

    .btn-success:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
    }

    .btn-secondary {
        padding: 12px 16px;
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text-muted);
        font-weight: 600;
        font-size: 15px;
        cursor: pointer;
        transition: all 0.3s ease;
        display: inline-block;
        text-decoration: none;
        text-align: center;
    }

    .btn-secondary:hover {
        border-color: var(--accent);
        color: var(--accent);
        background: rgba(37, 99, 235, 0.1);
    }

    @media (max-width: 480px) {
        .success-card {
            padding: 24px;
        }

        .success-card h1 {
            font-size: 24px;
        }

        .success-icon {
            font-size: 48px;
        }
    }
</style>
{% endblock %}
